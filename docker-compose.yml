services:
  backend:
    build: ./backend
    container_name: fleet-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: http://localhost:8000
    container_name: fleet-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
